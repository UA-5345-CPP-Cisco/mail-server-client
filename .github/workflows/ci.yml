name: CI Build & Test

on:
  push:
    branches:
      - main
      - develop
      - 'experimental/**'
      - 'feature/**'
      - 'bugfix/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common libsqlite3-dev libssl-dev
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-format-22
          sudo update-alternatives --install /usr/bin/clang-format clang-format /usr/bin/clang-format-22 100
          clang-format --version

      - name: Check formatting
        run: scripts/clang-check-format.sh

      - name: Configure CMake
        run: cmake -B build -DMAIL_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build -LE cryptopp --output-on-failure
