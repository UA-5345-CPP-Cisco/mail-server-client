name: CI Build & Test

on:
  pull_request:
    branches:
      - main
      - 'development/**'
    paths:
      - 'apps/**/*.cpp'
      - 'apps/**/*.h'
      - 'apps/**/*.hpp'
      - 'libs/**/*.cpp'
      - 'libs/**/*.h'
      - 'libs/**/*.hpp'
      - 'tests/**/*.cpp'
      - 'tests/**/*.h'
      - 'tests/**/*.hpp'
      - '**/CMakeLists.txt'
      - 'cmake/**/*.cmake'
      - 'CMakePresets.json'
      - '.clang-format'
      - 'scripts/*.sh'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release software-properties-common libsqlite3-dev libssl-dev ccache
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 22
          sudo apt-get install -y clang-format-22
          clang-format-22 --version

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('**/CMakeLists.txt', '**/*.cpp', '**/*.h', '**/*.hpp') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Check formatting
        run: CLANG_FORMAT=clang-format-22 scripts/clang-check-format.sh

      - name: Configure CMake
        run: >
          cmake -B build
          -DMAIL_BUILD_TESTS=ON
          -DMAIL_BUILD_QT_CLIENT=OFF
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build -LE cryptopp --output-on-failure
