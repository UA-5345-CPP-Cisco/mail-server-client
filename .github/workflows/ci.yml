name: CI Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format libsqlite3-dev libssl-dev

      - name: Check formatting
        run: scripts/clang-check-format.sh

      - name: Configure CMake
        run: cmake -B build -DMAIL_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build --parallel $(nproc)

      - name: Run tests
        run: ctest --test-dir build -LE cryptopp --output-on-failure
